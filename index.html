<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HEBE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F6F6F3; --card:#FFFFFF; --card2:#F1F1EC; --text:#1E1E1C; --text2:#6B6B65; --text3:#9C9C94;
  --line:rgba(30,30,28,.09); --line2:rgba(30,30,28,.16);
  --teal:#1D9E75; --teal-bg:#E1F5EE; --teal-dk:#085041;
  --purple:#534AB7; --purple-bg:#EEEDFE; --purple-dk:#26215C;
  --amber:#BA7517; --amber-bg:#FAEEDA; --amber-dk:#633806;
  --coral:#D85A30; --coral-bg:#FAECE7; --coral-dk:#4A1B0C;
  --r:12px;
}
html.dark{
  --bg:#141412; --card:#1E1E1B; --card2:#262622; --text:#F0F0EC; --text2:#A6A69E; --text3:#75756E;
  --line:rgba(240,240,236,.09); --line2:rgba(240,240,236,.18);
  --teal:#5DCAA5; --teal-bg:#0B3A2C; --teal-dk:#9FE1CB;
  --purple:#AFA9EC; --purple-bg:#2A2557; --purple-dk:#CECBF6;
  --amber:#EF9F27; --amber-bg:#42300E; --amber-dk:#FAC775;
  --coral:#F0997B; --coral-bg:#47210F; --coral-dk:#F5C4B3;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5}
#app{display:grid;grid-template-columns:200px 1fr;min-height:100vh}
aside{border-right:1px solid var(--line);padding:20px 12px;display:flex;flex-direction:column;gap:2px;position:sticky;top:0;height:100vh}
.brand{font-weight:800;letter-spacing:.18em;font-size:17px;padding:0 10px 18px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;font-size:13.5px;color:var(--text2);cursor:pointer;border:none;background:none;text-align:left;width:100%;font-family:inherit}
.nav-item:hover{background:var(--card2)}
.nav-item.active{background:var(--teal-bg);color:var(--teal-dk);font-weight:600}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.nav-bottom{margin-top:auto}
.syncrow{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text3);padding:6px 10px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
main{padding:22px 26px 90px;max-width:1060px;width:100%;margin:0 auto}
.topline{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;gap:10px;flex-wrap:wrap}
.topline .l{font-size:13.5px;color:var(--text2)}
.topline .r{font-size:12px;color:var(--text3)}
.proto-pill{display:inline-block;background:var(--amber-bg);color:var(--amber-dk);border-radius:99px;padding:1px 10px;font-size:11.5px;margin-left:8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.tile .k{font-size:11.5px;color:var(--text2)}
.tile .v{font-size:19px;font-weight:600;margin-top:1px}
.tile .s{font-size:11px;margin-top:1px;color:var(--text3)}
.grid2{display:grid;grid-template-columns:5fr 4fr;gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid2eq{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mt{margin-top:14px}
h2{font-size:16px;font-weight:650;margin:0 0 10px}
h3{font-size:13.5px;font-weight:600;margin:0}
.sub{font-size:12px;color:var(--text2)}
.hero-num{font-size:54px;font-weight:650;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:99px;padding:3px 11px;font-size:12px;font-weight:500}
.badge.teal{background:var(--teal-bg);color:var(--teal-dk)}
.badge.coral{background:var(--coral-bg);color:var(--coral-dk)}
.badge.gray{background:var(--card2);color:var(--text2)}
.coach-tag{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--purple);font-weight:600}
.coach-tag svg{width:16px;height:16px;flex-shrink:0}
.insight svg{width:17px;height:17px;flex-shrink:0}
button.btn{font-family:inherit;font-size:13px;border-radius:9px;padding:9px 16px;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--text)}
button.btn:hover{background:var(--card2)}
button.btn.primary{background:var(--teal-bg);color:var(--teal-dk);border-color:transparent;font-weight:600}
button.btn.danger{background:var(--coral-bg);color:var(--coral-dk);border-color:transparent}
button.btn:disabled{opacity:.45;cursor:default}
.chip{display:inline-block;font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--line2);color:var(--text2);cursor:pointer;background:var(--card);font-family:inherit}
.chip.on{background:var(--teal-bg);color:var(--teal-dk);border-color:transparent;font-weight:600}
input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--text);background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%;outline:none}
input:focus,textarea:focus{border-color:var(--teal)}
label.f{font-size:11.5px;color:var(--text2);display:block;margin-bottom:3px}
.frow{display:flex;gap:10px;align-items:end}
.frow>div{flex:1}
.insight{background:var(--purple-bg);border-radius:var(--r);padding:12px 15px;display:flex;gap:10px;align-items:flex-start}
.insight .t{font-size:11.5px;color:var(--purple);font-weight:600}
.insight .b{font-size:13px;color:var(--purple-dk);line-height:1.45;margin-top:1px}
.foodrow{padding:11px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
.flag{display:inline-block;font-size:11px;background:var(--coral-bg);color:var(--coral-dk);border-radius:99px;padding:2px 9px;margin:2px 3px 0 0}
.scorepill{font-weight:700;font-size:13.5px;border-radius:99px;padding:3px 11px}
.list-item{display:flex;justify-content:space-between;align-items:center;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13px}
.list-item:last-child{border-bottom:none}
canvas{max-width:100%}
.chartbox{position:relative;height:210px}
.chartbox.tall{height:260px}
.range-tabs{display:inline-flex;background:var(--card2);border-radius:9px;padding:3px;gap:2px}
.range-tabs button{border:none;background:none;font-family:inherit;font-size:12px;padding:5px 12px;border-radius:7px;color:var(--text2);cursor:pointer}
.range-tabs button.on{background:var(--card);color:var(--text);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06)}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;background:var(--card);border:1px solid var(--line2);border-radius:10px;padding:9px 16px;font-size:13px;display:none;box-shadow:0 4px 18px rgba(0,0,0,.12)}
.modal-bg{position:fixed;inset:0;background:rgba(20,20,18,.5);z-index:60;display:none;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:16px;padding:22px;max-width:430px;width:100%;max-height:85vh;overflow-y:auto}
nav.bottom{display:none}
@media (max-width:880px){
  #app{grid-template-columns:1fr}
  aside{display:none}
  main{padding:16px 14px 96px}
  .grid2,.grid2eq{grid-template-columns:1fr}
  .grid4{grid-template-columns:repeat(2,1fr)}
  nav.bottom{display:grid;grid-template-columns:repeat(6,1fr);position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);padding:8px 4px calc(10px + env(safe-area-inset-bottom));z-index:50}
  nav.bottom button{border:none;background:none;font-family:inherit;font-size:10px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
  nav.bottom button.active{color:var(--teal)}
  nav.bottom svg{width:20px;height:20px}
  .hero-num{font-size:46px}
}
.fade{animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="brand">HEBE</div>
    <div id="sideNav"></div>
    <div class="nav-bottom">
      <button class="nav-item" data-page="setup" id="setupNavBtn"></button>
      <button class="nav-item" id="themeToggle"></button>
      <div class="syncrow"><span class="dot" id="syncDot"></span><span id="syncLbl">Local only</span></div>
    </div>
  </aside>
  <main id="main"></main>
</div>
<nav class="bottom" id="bottomNav"></nav>
<div id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
'use strict';
/* ================= HEBE — v2 ================= */

const DEFAULT_API_KEY = ''; // never commit a real key — paste it in Setup instead (saved per device)
const DOB_DEFAULT = '2001-02-05';

const ICONS = {
  home:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H3l9-9 9 9h-2M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/><path d="M9 21v-6a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v6"/></svg>',
  perf:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>',
  fuel:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21c-4 0-7-3-7-7 0-3 2-6 7-11 5 5 7 8 7 11 0 4-3 7-7 7z"/></svg>',
  body:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 13.5 12 21l-7.5-7.5a5 5 0 1 1 7.5-6.5 5 5 0 1 1 7.5 6.5z"/><path d="M3 12h4l2-3 3 6 2-3h7"/></svg>',
  reports:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 15v-3M12 15V9M17 15v-6"/></svg>',
  setup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>',
  moon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>',
  sun:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
  chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>',
  bulb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 21h4M12 3a6 6 0 0 1 3.6 10.8 3.5 3.5 0 0 0-1.1 2.2H9.5a3.5 3.5 0 0 0-1.1-2.2A6 6 0 0 1 12 3z"/></svg>',
  down:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l6 6 4-4 8 8"/><path d="M21 11v6h-6"/></svg>',
  up:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 13V7h-6"/></svg>'
};

const CHIPS = [
  { id:'skipGym',   label:'Skipped gym',      apply:m=>{m.workoutDone=false;m.workoutMin=0;} },
  { id:'noRide',    label:'No ride',          apply:m=>{m.rideH=0;} },
  { id:'sleptLess', label:'Slept less',       apply:m=>{m.sleepH=Math.max(4,m.sleepH-1.5);m.sleepQ=Math.max(1,m.sleepQ-1);} },
  { id:'sleptMore', label:'Slept more',       apply:m=>{m.sleepH=m.sleepH+1;} },
  { id:'ateOff',    label:'Ate off-plan',     apply:m=>{m.protein=Math.max(0,m.protein-20);} },
  { id:'extraMeal', label:'Extra meal',       apply:m=>{m.protein=m.protein+30;m.fastingH=Math.max(0,m.fastingH-4);} },
  { id:'stressDay', label:'Stressful day',    apply:m=>{m.stress=Math.min(10,m.stress+4);m.mood=Math.max(1,m.mood-2);} },
  { id:'lowEnergy', label:'Low energy',       apply:m=>{m.energy=Math.max(1,m.energy-3);} },
];

const JUNK = [
  { rx:/sucralose/i, name:'sucralose', why:'artificial sweetener linked to gut microbiome disruption' },
  { rx:/aspartame/i, name:'aspartame', why:'artificial sweetener, controversial long-term data' },
  { rx:/acesulfame/i, name:'acesulfame-K', why:'artificial sweetener' },
  { rx:/high[- ]fructose corn syrup|glucose[- ]fructose/i, name:'high-fructose corn syrup', why:'strongly tied to metabolic disease' },
  { rx:/corn syrup/i, name:'corn syrup', why:'refined sugar' },
  { rx:/maltodextrin/i, name:'maltodextrin', why:'high-glycemic filler' },
  { rx:/dextrose/i, name:'dextrose', why:'refined sugar' },
  { rx:/\bcane sugar|\bsugar\b|sucrose/i, name:'added sugar', why:'added sugar' },
  { rx:/hydrogenated/i, name:'hydrogenated oil', why:'trans-fat risk' },
  { rx:/palm oil|palm fat/i, name:'palm oil', why:'highly processed saturated fat' },
  { rx:/soy(bean)? oil/i, name:'soybean oil', why:'refined seed oil, omega-6 heavy' },
  { rx:/canola|rapeseed oil/i, name:'canola oil', why:'refined seed oil' },
  { rx:/sunflower oil/i, name:'sunflower oil', why:'refined seed oil' },
  { rx:/cottonseed oil/i, name:'cottonseed oil', why:'refined seed oil' },
  { rx:/vegetable oil/i, name:'vegetable oil', why:'unspecified refined seed oil' },
  { rx:/natural flavou?r/i, name:'natural flavors', why:'catch-all hiding unknown additives' },
  { rx:/artificial flavou?r/i, name:'artificial flavors', why:'synthetic flavoring' },
  { rx:/red 40|allura|yellow 5|tartrazine|blue 1|red 3|artificial colou?r/i, name:'artificial colors', why:'synthetic dyes' },
  { rx:/caramel colou?r/i, name:'caramel color', why:'processed coloring' },
  { rx:/sodium nitrite|sodium nitrate/i, name:'nitrites/nitrates', why:'processed-meat preservative, cancer-risk link' },
  { rx:/\bbha\b|\bbht\b|tbhq/i, name:'BHA/BHT/TBHQ', why:'synthetic preservatives' },
  { rx:/monosodium glutamate|\bmsg\b/i, name:'MSG', why:'flavor enhancer' },
  { rx:/carrageenan/i, name:'carrageenan', why:'thickener linked to gut inflammation' },
  { rx:/polysorbate/i, name:'polysorbate', why:'emulsifier, may disrupt gut lining' },
  { rx:/sodium benzoate/i, name:'sodium benzoate', why:'preservative' },
  { rx:/titanium dioxide/i, name:'titanium dioxide', why:'whitener banned in EU foods' },
  { rx:/mono-? and diglycerides/i, name:'mono/diglycerides', why:'emulsifier' },
];

const TEMPLATE_DEFAULTS = {
  weekday: { sleepH:7, sleepQ:7, workoutDone:true, workoutMin:60, rideH:1.75, sitH:7, sunMin:40, protein:138, water:2.5, supplements:true, mood:7, energy:7, stress:3, fastingH:19.5 },
  weekend: { sleepH:8, sleepQ:7, workoutDone:false, workoutMin:0, rideH:0, sitH:6, sunMin:20, protein:120, water:2.5, supplements:true, mood:7, energy:7, stress:2, fastingH:14 }
};
const METRIC_FIELDS = Object.keys(TEMPLATE_DEFAULTS.weekday);

// ---------- state ----------
const pad = n => String(n).padStart(2,'0');
const dstr = d => d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const todayStr = () => dstr(new Date());

let S = {
  page:'home', date:todayStr(), trendRange:30,
  days:{},
  settings:{ dob:DOB_DEFAULT, name:'Kanish', apiKey:DEFAULT_API_KEY, model:'claude-sonnet-5', proteinTarget:135, theme:'light', fbConfig:'' },
  templates: JSON.parse(JSON.stringify(TEMPLATE_DEFAULTS)),
  protocols: [],
  lastWorkoutType:'core',
  fb:{ app:null, db:null, user:null, status:'local' },
  coachCache:{},
};
let charts = {}, saveTimer=null, checkinOpen=false, activeChips=new Set();

function defaultProtocols(){
  // 4-week weekend-fasting block anchored to the current weekend:
  // on Sunday, back up to yesterday's Saturday; otherwise use this week's Saturday
  const now = new Date();
  const dow = now.getDay();
  const sat = new Date(now); sat.setDate(sat.getDate() + (dow===0 ? -1 : (6-dow)));
  const end = new Date(sat); end.setDate(end.getDate() + 22); // covers 4 weekends
  return [{ id:'fast4', name:'Weekend fasting', type:'fasting', days:[0,6], start:dstr(sat), end:dstr(end), note:'Full-day fasts Sat + Sun for 4 weeks.' }];
}

function loadLocal(){
  try{ S.days = JSON.parse(localStorage.getItem('hebe_days')||'{}'); }catch(e){ S.days={}; }
  try{ Object.assign(S.settings, JSON.parse(localStorage.getItem('hebe_settings')||'{}')); }catch(e){}
  try{ const t = JSON.parse(localStorage.getItem('hebe_templates')||'null'); if(t) S.templates=t; }catch(e){}
  try{ const p = JSON.parse(localStorage.getItem('hebe_protocols')||'null'); S.protocols = p || defaultProtocols(); }catch(e){ S.protocols=defaultProtocols(); }
  try{ S.lastWorkoutType = localStorage.getItem('hebe_lastwt')||'core'; }catch(e){}
  if(!S.settings.apiKey) S.settings.apiKey = DEFAULT_API_KEY;
}
function persist(){
  localStorage.setItem('hebe_days', JSON.stringify(S.days));
  localStorage.setItem('hebe_settings', JSON.stringify(S.settings));
  localStorage.setItem('hebe_templates', JSON.stringify(S.templates));
  localStorage.setItem('hebe_protocols', JSON.stringify(S.protocols));
  localStorage.setItem('hebe_lastwt', S.lastWorkoutType);
}

// ---------- rituals engine ----------
function templateFor(date){
  const dow = new Date(date+'T12:00:00').getDay();
  return (dow===0||dow===6) ? 'weekend' : 'weekday';
}
function activeProtocol(date){
  const dow = new Date(date+'T12:00:00').getDay();
  return S.protocols.find(p => date>=p.start && date<=p.end && p.days.includes(dow)) || null;
}
function protocolWeek(p, date){
  const ms = new Date(date+'T12:00:00') - new Date(p.start+'T12:00:00');
  return Math.floor(ms/(7*864e5))+1;
}
function ensureDay(date){
  if(!S.days[date]){
    const tpl = templateFor(date);
    const m = Object.assign({}, S.templates[tpl]);
    const proto = activeProtocol(date);
    let protoId = null;
    if(proto && proto.type==='fasting'){ m.protein=0; m.fastingH=24; m.water=3; protoId=proto.id; }
    S.days[date] = { date, template:tpl, protocolId:protoId, confirmed:false, metrics:m,
      workoutType: tpl==='weekday' ? (S.lastWorkoutType==='core'?'arms':'core') : null,
      wearable:{hrv:null,restingHR:null,recoveryPct:null,strain:null},
      heart:{rhr:null}, skin:{score:null,notes:''},
      foods:[], deviations:[], checkinText:'', notes:'', hebeAge:null, updatedAt:0 };
  }
  return S.days[date];
}
function saveDay(date){
  const d = ensureDay(date);
  d.updatedAt = Date.now();
  d.hebeAge = computeHebeAge(date);
  persist();
  cloudPush(date);
}
function confirmedDates(before){
  return Object.keys(S.days).filter(k => S.days[k].updatedAt>0 && (!before || k<=before)).sort();
}

// ---------- HEBE age engine ----------
function chronoAge(date){
  const dob = new Date((S.settings.dob||DOB_DEFAULT)+'T12:00:00');
  return (new Date(date+'T12:00:00') - dob) / (365.2425*864e5);
}
function windowStats(date, span){
  const dates = confirmedDates(date).slice(-span);
  if(!dates.length) return null;
  const st = { n:dates.length, sleepH:0, sleepQ:0, trainH:0, liftDays:0, sitH:0, stress:0, mood:0, food:[], rhr:[] };
  dates.forEach(k=>{
    const d = S.days[k], m = d.metrics;
    st.sleepH+=m.sleepH; st.sleepQ+=m.sleepQ; st.trainH += m.rideH + (m.workoutMin||0)/60;
    if(m.workoutDone) st.liftDays++;
    st.sitH+=m.sitH; st.stress+=m.stress; st.mood+=m.mood;
    (d.foods||[]).forEach(f=>{ if(typeof f.score==='number') st.food.push(f.score); });
    const r = d.heart&&d.heart.rhr || d.wearable&&d.wearable.restingHR; if(r) st.rhr.push(r);
  });
  ['sleepH','sleepQ','trainH','sitH','stress','mood'].forEach(k=> st[k]/=st.n);
  st.liftPerWk = st.liftDays/st.n*7;
  st.foodAvg = st.food.length ? st.food.reduce((a,b)=>a+b,0)/st.food.length : null;
  st.rhrAvg = st.rhr.length ? st.rhr.reduce((a,b)=>a+b,0)/st.rhr.length : null;
  return st;
}
const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));
// Age-equivalent conversion (Gompertz): adult all-cause mortality doubles
// ~every 8y, so Δage = ln(HR)/0.0866 = 11.55·ln(HR). Every coefficient below
// is derived from a published all-cause-mortality meta-analysis — see
// HEBE_ACCURACY.md for the studies, hazard ratios and the arithmetic.
function ageAdjustments(st){
  if(!st) return { total:0, parts:[] };
  const parts = [];

  // SLEEP — optimum is 7h (not 8h). Dose-response HRs vs 7h (JAHA 2017,
  // 1.38M people): 5h~1.04, 6h~1.01, 8h~1.07, 9h~1.21. Long sleep penalised
  // harder than short. Ref ~6.7h (population median) offset via -0.10.
  let sleep = (st.sleepH <= 7) ? (7-st.sleepH)*0.22 - 0.10 : (st.sleepH-7)*0.85 - 0.10;
  parts.push(['Sleep', clamp(sleep, -0.3, 2.5)]);

  // TRAINING VOLUME — cardiorespiratory fitness / activity. ~13% lower
  // mortality per MET (HR0.87 → -1.6y/MET); benefit plateaus past guidelines.
  // Bonus-only, ref = meets guideline (~0.7h/day activity).
  parts.push(['Training volume', -Math.min(2.2, Math.max(0, st.trainH-0.7)*1.3)]);

  // STRENGTH — resistance training's effect INDEPENDENT of aerobic: ≥2×/wk
  // HR0.92 → ~-1.0y (joint-effects cohort). Bonus-only.
  parts.push(['Strength', st.liftPerWk>=3 ? -0.75 : (st.liftPerWk>=1.5 ? -0.5 : (st.liftPerWk>=0.5?-0.25:0))]);

  // SITTING — HR1.03 per hour above ~8h threshold (→ +0.34y/h), strongly
  // attenuated in the highly active (JACC 2019). Ref 8h.
  parts.push(['Sitting', clamp(st.sitH>8 ? (st.sitH-8)*0.30*(st.trainH>1?0.6:1) : 0, 0, 1.2)]);

  // FOOD QUALITY — highest-vs-lowest ultra-processed intake HR~1.18
  // (→ ~1.9y full swing). Ingredient score 0-100 mapped around ref 65.
  parts.push(['Food quality', st.foodAvg!=null ? clamp((65-st.foodAvg)*0.03, -1.5, 1.5) : 0]);

  // RESTING HR — HR1.09 per +10bpm (→ ~+1.0y/10bpm, 1.25M people). Ref 65bpm.
  parts.push(['Resting HR', st.rhrAvg!=null ? clamp((st.rhrAvg-65)*0.10, -1.5, 1.5) : 0]);

  // STRESS — chronic psychological stress ~HR1.1-1.2; modest + self-reported.
  parts.push(['Stress', st.stress>6 ? 0.6 : (st.stress>4?0.3:0)]);

  // Total capped ±6y: lifestyle extremes span ~12y of life expectancy
  // (Li et al., Circulation 2018), so ±6 around the mean is the honest ceiling.
  const total = clamp(parts.reduce((a,p)=>a+p[1],0), -6, 6);
  return { total, parts };
}
function computeHebeAge(date){
  const chrono = chronoAge(date);
  const st = windowStats(date, 21);
  const raw = chrono + ageAdjustments(st).total;
  // EMA smoothing against previous confirmed day
  const prev = confirmedDates(date).filter(k=>k<date).pop();
  const prevAge = prev && S.days[prev].hebeAge!=null ? S.days[prev].hebeAge : null;
  const smoothed = prevAge!=null ? prevAge + 0.25*(raw-prevAge) : raw;
  return Math.round(smoothed*100)/100;
}
function ageTrendPerMonth(date){
  const dates = confirmedDates(date).filter(k=>S.days[k].hebeAge!=null);
  if(dates.length<2) return null;
  const first = dates[Math.max(0,dates.length-31)], last = dates[dates.length-1];
  const spanDays = (new Date(last)-new Date(first))/864e5;
  if(spanDays<1) return null;
  const delta = (S.days[last].hebeAge - S.days[first].hebeAge)/spanDays*30;
  // subtract natural chronological drift (~0.082/month) to show behavior-driven trend
  return Math.round((delta - 30/365.2425)*100)/100;
}

// ---------- evening debrief engine ----------
// Reuses the SAME published-HR coefficients as the HEBE-age model, but fed
// a single day's inputs, so the debrief is medically consistent with the age
// engine. Each ledger value is an age-equivalent (years) — read as "the effect
// if every day looked like today", which is exactly what the coefficient means.
function singleDayStat(date){
  const d = S.days[date]; if(!d) return null;
  const m = d.metrics;
  const food = (d.foods||[]).filter(f=>typeof f.score==='number').map(f=>f.score);
  const rhr = (d.heart&&d.heart.rhr) || (d.wearable&&d.wearable.restingHR) || null;
  return {
    n:1,
    sleepH:m.sleepH, sleepQ:m.sleepQ,
    trainH: m.rideH + (m.workoutMin||0)/60,
    liftPerWk: m.workoutDone ? 7 : 0,   // lifted today → full strength credit for the day
    sitH:m.sitH, stress:m.stress, mood:m.mood,
    foodAvg: food.length ? food.reduce((a,b)=>a+b,0)/food.length : null,
    rhrAvg: rhr
  };
}
const LEDGER_META = {
  'Sleep':           { good:'Slept near the 7h optimum',      bad:'Sleep off the 7h optimum',            fix:'Aim for ~7h — start winding down earlier tonight.' },
  'Training volume': { good:'Strong training load',           bad:'Low movement today',                  fix:'Add a ride or a brisk 30-min walk tomorrow.' },
  'Strength':        { good:'Resistance training banked',     bad:'No lifting today',                     fix:'Fit a lifting session in tomorrow.' },
  'Sitting':         { good:'Low sitting time',               bad:'Long sitting stretch',                 fix:'Break sitting every 30–60 min; stand/walk more.' },
  'Food quality':    { good:'Clean food quality',             bad:'Processed food pulled the day down',   fix:'Swap the flagged items for whole foods tomorrow.' },
  'Resting HR':      { good:'Athlete-low resting HR',         bad:'Resting HR above reference',           fix:'Prioritise sleep + zone-2; RHR follows recovery.' },
  'Stress':          { good:'Stress stayed low',              bad:'Stress ran high',                      fix:'A short wind-down / breathing block before bed.' }
};
// What actually moved today's ledger, in age-equivalent years, split good/bad.
function dayLedger(date){
  const st = singleDayStat(date);
  if(!st) return { helped:[], hurt:[], total:0, parts:[] };
  const { parts, total } = ageAdjustments(st);
  const helped=[], hurt=[];
  parts.forEach(([name,val])=>{
    const meta = LEDGER_META[name]||{good:name,bad:name,fix:''};
    if(val <= -0.03) helped.push({ name, val, label:meta.good });
    else if(val >= 0.03) hurt.push({ name, val, label:meta.bad, fix:meta.fix });
  });
  helped.sort((a,b)=>a.val-b.val);   // most youthening first (most negative)
  hurt.sort((a,b)=>b.val-a.val);     // most aging first
  return { helped, hurt, total, parts };
}
// Performance level vs published, age-referenced guidelines. Named bands only —
// the evidence doesn't support a fake single 0-100 number.
const PERF_BANDS = ['Below reference','On track','Strong','Elite'];
function bandColor(i){ return ['var(--coral)','var(--amber)','var(--teal)','var(--teal)'][i]; }
function performanceGrades(date){
  const d = S.days[date]; if(!d) return null;
  const m = d.metrics, age = chronoAge(date);
  // 7-day strength frequency (WHO: muscle-strengthening ≥2 days/week)
  const wk = confirmedDates(date).slice(-7);
  let lifts = wk.filter(k=>S.days[k].metrics.workoutDone).length;
  if(!wk.includes(date) && m.workoutDone) lifts++; // include today if unconfirmed
  const rhr = (d.heart&&d.heart.rhr) || (d.wearable&&d.wearable.restingHR) || null;

  const grade = (v,[a,b,c]) => v>=c?3 : v>=b?2 : v>=a?1 : 0; // ascending thresholds
  const rows = [];

  // AEROBIC — WHO 2020: 150–300 min/wk moderate OR 75–150 vigorous (1 vig=2 mod).
  // Daily moderate-equivalent target ≈ 21–43 min. Ride = zone-2 (moderate),
  // workout = vigorous (×2).
  const modEq = m.rideH*60 + (m.workoutDone ? (m.workoutMin||0)*2 : 0);
  rows.push({ name:'Aerobic activity', band:grade(modEq,[10,21,43]),
    note:Math.round(modEq)+' min mod-equiv today (WHO target 21–43/day)' });

  // STRENGTH — WHO: ≥2 days/week muscle-strengthening.
  rows.push({ name:'Strength', band:grade(lifts,[1,2,3]),
    note:lifts+'× in 7 days (WHO target ≥2/wk)' });

  // SLEEP — AASM/NSF: adults 7–9h; optimum ~7h (mortality U-curve). 65+: 7–8h.
  const so = Math.abs(m.sleepH-7);
  const sBand = so<=0.5?3 : (m.sleepH>=6.25&&m.sleepH<=8.5?2 : (m.sleepH>=5.5&&m.sleepH<=9?1:0));
  rows.push({ name:'Sleep', band:sBand, note:m.sleepH+'h (optimal ~7h, healthy 7–9h)' });

  // SITTING — sedentary ≥8h/day raises mortality; lower is better.
  const sitBand = m.sitH<6?3 : m.sitH<8?2 : m.sitH<10?1 : 0;
  rows.push({ name:'Sitting', band:sitBand, note:m.sitH+'h sitting (risk climbs past ~8h)' });

  // PROTEIN — vs your target (active adults ~1.2–1.6 g/kg; needs rise with age).
  const T = S.settings.proteinTarget||135;
  rows.push({ name:'Protein', band:grade(m.protein,[T*0.6,T*0.85,T]),
    note:m.protein+'g / '+T+'g target' });

  // RESTING HR — only when measured. Athlete-low is protective.
  if(rhr) rows.push({ name:'Resting HR', band:(rhr<55?3:rhr<65?2:rhr<75?1:0),
    note:rhr+' bpm (athlete <55, healthy <65)' });

  // Overall: weight the best-evidenced domains heaviest.
  const W = { 'Aerobic activity':3, 'Sleep':3, 'Strength':2, 'Resting HR':2, 'Sitting':1.5, 'Protein':1 };
  let num=0, den=0;
  rows.forEach(r=>{ const w=W[r.name]||1; num+=r.band*w; den+=w; });
  const overall = Math.round(num/den);
  return { rows, overall, age };
}
// One-line verdict: today's age-equivalent vs the 21-day baseline.
function debriefVerdict(date){
  const today = dayLedger(date).total;
  const base = ageAdjustments(windowStats(date,21)).total;
  const diff = today - base;                 // lower (more negative) = better day
  if(Math.abs(diff)<0.15) return { word:'held', dir:0, text:'Today held your recent line — steady is a win.' };
  if(diff<0) return { word:'a strong day', dir:-1, text:'Today ran younger than your 21-day average.' };
  return { word:'a soft day', dir:1, text:'Today ran a little older than your 21-day average.' };
}

// ---------- coach + insights (rule-based, AI-upgraded) ----------
function coachSegment(){
  const h = new Date().getHours();
  return h<10 ? 'morning' : (h<17 ? 'midday' : 'evening');
}
function coachMessage(){
  const seg = coachSegment();
  const cacheKey = S.date+'-'+seg;
  if(S.coachCache[cacheKey]) return { seg, text:S.coachCache[cacheKey], ai:true };
  const d = ensureDay(S.date), m = d.metrics;
  const proto = activeProtocol(S.date);
  const st = windowStats(S.date, 14);
  let text = '';
  if(seg==='morning'){
    if(d.template==='weekday'){
      text = 'Plan: ride out, '+(d.workoutType||'core')+' day + heavy compounds, coffee at 10. ';
      if(st && st.sleepH<7.2) text += 'Sleep has been running '+st.sleepH.toFixed(1)+'h — tonight is the fix, lights out by 11.';
      else text += 'Recovery looks solid — push the compounds today.';
    } else if(proto){ text = 'Fast day, week '+protocolWeek(proto,S.date)+' of 4. Water, electrolytes, easy pace. Note your energy — that is the experiment data.'; }
    else text = 'Rest day. A walk and some sun keep the ledger positive without loading recovery.';
  } else if(seg==='midday'){
    if(d.template==='weekday') text = 'Deep in the fasting window (~'+(m.fastingH||19)+'h daily). Stay on water; if focus dips before 3, that is data worth logging tonight.';
    else if(proto) text = 'Mid-fast. Hunger comes in waves and passes — log mood and energy when it does.';
    else text = 'Easy weekend pace. Sun counts double for the ledger.';
  } else {
    const logged = d.confirmed ? 'Day is logged.' : 'Day is not confirmed yet — 10 seconds below.';
    if(d.template==='weekday') text = logged+' '+(m.workoutDone?'Session + both commutes in the bank. ':'')+'Protect tomorrow: in bed by 11 gives you '+(7+0.5)+'h+ before a heavy morning.';
    else if(proto) text = logged+' Fast day nearly done — tomorrow’s training will show what it cost or paid. Sleep is the refeed.';
    else text = logged+' Quiet day is a recovery day. Bank the sleep.';
  }
  return { seg, text, ai:false };
}
async function coachAI(){

      + ', domains='+JSON.stringify(perf?perf.rows.map(r=>r.name+':'+PERF_BANDS[r.band]):[])
      + ', helpedToday='+JSON.stringify(led.helped.map(x=>x.name))

  const text = await claude([{role:'user',content:usr}], sys, 320);
  S.coachCache[S.date+'-'+seg] = text.trim();

}
function insights(){
  const out = [];
  const dates = confirmedDates();
  // core vs arms sleep quality
  const core=[], arms=[];
  dates.forEach(k=>{ const d=S.days[k]; if(d.workoutType==='core') core.push(d.metrics.sleepQ); if(d.workoutType==='arms') arms.push(d.metrics.sleepQ); });
  if(core.length>=3 && arms.length>=3){
    const ca=core.reduce((a,b)=>a+b,0)/core.length, aa=arms.reduce((a,b)=>a+b,0)/arms.length;
    if(Math.abs(ca-aa)>=0.4) out.push('Sleep quality runs '+Math.round(Math.abs(ca-aa)/Math.max(aa,ca)*100)+'% higher on '+(ca>aa?'core':'arms')+' days than '+(ca>aa?'arms':'core')+' days.');
  }
  // protocol effect
  const p = S.protocols[0];
  if(p){
    const during = dates.filter(k=>k>=p.start&&k<=p.end&&activeProtocol(k));
    const after = during.map(k=>{ const n=new Date(k+'T12:00:00'); n.setDate(n.getDate()+1); return dstr(n); }).filter(k=>S.days[k]&&S.days[k].updatedAt>0);
    if(after.length>=2){
      const en = after.reduce((a,k)=>a+S.days[k].metrics.energy,0)/after.length;
      out.push('Post-fast days average energy '+en.toFixed(1)+'/10 — '+(en>=6.5?'the weekend fasts are not costing you Mondays.':'watch Monday energy; the fasts may be cutting into it.'));
    }
  }
  // sleep vs mood next day
  let pairs=[];
  dates.forEach(k=>{ const n=new Date(k+'T12:00:00'); n.setDate(n.getDate()+1); const nk=dstr(n);
    if(S.days[nk]&&S.days[nk].updatedAt>0) pairs.push([S.days[k].metrics.sleepH, S.days[nk].metrics.mood]); });
  if(pairs.length>=5){
    const lo = pairs.filter(p=>p[0]<7), hi = pairs.filter(p=>p[0]>=7);
    if(lo.length>=2&&hi.length>=2){
      const lm=lo.reduce((a,p)=>a+p[1],0)/lo.length, hm=hi.reduce((a,p)=>a+p[1],0)/hi.length;
      if(hm-lm>=0.5) out.push('Nights over 7h are followed by mood '+((hm-lm)).toFixed(1)+' points higher the next day.');
    }
  }
  if(!out.length) out.push(dates.length<7 ? 'Log '+(7-dates.length)+' more day'+(7-dates.length===1?'':'s')+' to unlock pattern detection.' : 'No strong new patterns this week — consistency itself is the pattern.');
  return out;
}

// ---------- Claude API ----------
async function claude(messages, system, maxTokens){
  const key = S.settings.apiKey;
  if(!key) throw new Error('No API key');
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{ 'content-type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({ model:S.settings.model||'claude-sonnet-5', max_tokens:maxTokens||500, system: system||undefined, messages })
  });
  if(!r.ok) throw new Error('API '+r.status);
  const j = await r.json();
  return textFromContent(j);
}
// Pull the first TEXT block. claude-sonnet-5 can return a leading
// "thinking" block, so content[0] is not always the answer.
function textFromContent(j){
  const blocks = (j&&j.content)||[];
  const t = blocks.find(b=>b&&b.type==='text'&&b.text);
  return t ? t.text : ((blocks[0]&&blocks[0].text)||'');
}
function extractJSON(txt){
  const m = String(txt).match(/\{[\s\S]*\}/);
  return m ? JSON.parse(m[0]) : null;
}

// ---------- food ----------
async function offSearch(q){
  const url = 'https://world.openfoodfacts.org/cgi/search.pl?search_terms='+encodeURIComponent(q)+'&search_simple=1&action=process&json=1&page_size=8&fields=product_name,brands,code,ingredients_text,nutriments,nutriscore_grade,nova_group';
  const r = await fetch(url); if(!r.ok) throw new Error('search failed');
  const j = await r.json();
  return (j.products||[]).filter(p=>p.product_name);
}
async function offBarcode(code){
  const r = await fetch('https://world.openfoodfacts.org/api/v2/product/'+encodeURIComponent(code)+'.json?fields=product_name,brands,code,ingredients_text,nutriments,nutriscore_grade,nova_group');
  if(!r.ok) throw new Error('lookup failed');
  const j = await r.json();
  return j.status===1 ? j.product : null;
}
function heuristicScore(name, ingredients, product){
  const flagged=[]; const text=(ingredients||'')+' '+(name||'');
  JUNK.forEach(j=>{ if(j.rx.test(text)&&!flagged.some(f=>f.ingredient===j.name)) flagged.push({ingredient:j.name,reason:j.why}); });
  let score; const g = product&&product.nutriscore_grade;
  if(g) score = ({a:90,b:75,c:60,d:42,e:25})[g]||55; else score = ingredients?70:55;
  score -= flagged.length*6;
  if(product&&Number(product.nova_group)===4) score -= 10;
  const novaG = product&&Number(product.nova_group)||null;
  return { score:clamp(Math.round(score),5,98), flagged, summary: flagged.length? flagged.length+' flagged ingredient(s).':'No red flags found.', nova:novaG, confidence: g?'med':'low', basis: g?('Nutri-Score '+g.toUpperCase()+(novaG?' · NOVA'+novaG:'')):'name-based estimate', src:'built-in' };
}
async function scoreFood(name, ingredients, product){
  if(!S.settings.apiKey) return heuristicScore(name, ingredients, product);
  try{
    const nutr = product&&product.nutriments ? JSON.stringify({kcal:product.nutriments['energy-kcal_100g'],sugar:product.nutriments.sugars_100g,protein:product.nutriments.proteins_100g,satfat:product.nutriments['saturated-fat_100g']}) : 'unknown';
    const txt = await claude([{role:'user',content:'Score this food 0-100 for ingredient quality relative to longevity/all-cause-mortality evidence.\nGround the score in established frameworks, in this order:\n1) NOVA processing class (1=unprocessed → 4=ultra-processed; UPF carries HR~1.15-1.21 for all-cause mortality, dose-response meta-analyses).\n2) Nutri-Score / nutrient profile (sat fat, added sugar, sodium, fibre, protein) from the /100g nutrition when present.\n3) Specific evidence-flagged ingredients (industrial seed oils, added/free sugars, sweeteners, "natural flavors", nitrites/nitrates, emulsifiers, dyes).\nAnchoring: NOVA1 whole food ~85-98, NOVA2 ~70-84, NOVA3 ~50-69, NOVA4 ultra-processed ~15-49.\nReport how confident you are: "high" = ingredients listed or a branded product with nutrition data; "med" = generic whole food judged from name; "low" = ambiguous/mixed dish estimated from name alone.\nState the single most important basis in one short phrase.\nFood: '+name+'\nIngredients: '+(ingredients||'NOT LISTED - infer NOVA class and nutrients from the name, lower your confidence')+'\nNutrition/100g: '+nutr+'\nONLY valid JSON: {"score":<int>,"nova":<1-4 or null>,"confidence":"high|med|low","basis":"<short phrase, e.g. NOVA4 ultra-processed + added sugar>","flagged":[{"ingredient":"...","reason":"..."}],"summary":"<one line>"}'}], 'You are a nutrition scientist scoring foods for longevity using NOVA classification, Nutri-Score nutrient profiling, and all-cause-mortality evidence for ultra-processed foods. Score on the evidence; never inflate certainty. When ingredients are unknown you MUST lower your confidence rather than guess precisely.', 700);
    const p = extractJSON(txt);
    return { score:clamp(Math.round(p.score),0,100), flagged:p.flagged||[], summary:p.summary||'', nova:(p.nova!=null?Number(p.nova):null), confidence:p.confidence||'med', basis:p.basis||'', src:'ai' };
  }catch(e){ console.warn(e); toast('AI scoring failed — used built-in scorer'); return heuristicScore(name, ingredients, product); }
}
async function addFood(name, product){
  toast('Scoring "'+name+'"…');
  const res = await scoreFood(name, product?product.ingredients_text:'', product);
  const n = product&&product.nutriments||{};
  const d = ensureDay(S.date);

function repeatOffenders(rangeDays){
  const counts={}; const cutoff = rangeDays? Date.now()-rangeDays*864e5 : 0;

    if(cutoff && (f.ts||0)<cutoff) return;
    (f.flagged||[]).forEach(i=> counts[i]=(counts[i]||0)+1);
  }));
  return Object.entries(counts).sort((a,b)=>b[1]-a[1]);
}

function protocolBandPlugin(dates){

function rolling(arr, w){
  return arr.map((v,i)=>{

  });
}

// ---------- firebase ----------
function parseFbConfig(){
  const raw=(S.settings.fbConfig||'').trim(); if(!raw) return null;
  try{
    const jsonish = raw.replace(/^[^{]*\{/s,'{').replace(/\}[^}]*$/s,'}').replace(/([,{]\s*)([A-Za-z0-9_]+)\s*:/g,'$1"$2":').replace(/'/g,'"').replace(/,\s*\}/g,'}');
    return JSON.parse(jsonish);
  }catch(e){ return null; }
}
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); }); }
async function initFirebase(){
  const cfg = parseFbConfig(); if(!cfg||S.fb.app) return;
  setSync('syncing');
  try{
    const v='10.14.1';
    await loadScript('https://www.gstatic.com/firebasejs/'+v+'/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/'+v+'/firebase-auth-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/'+v+'/firebase-firestore-compat.js');
    S.fb.app = firebase.initializeApp(cfg);
    S.fb.db = firebase.firestore();
    firebase.auth().onAuthStateChanged(async u=>{
      S.fb.user=u;
      if(u){ await pullCloud(); setSync('synced'); } else setSync('local');
      if(S.page==='setup') render();
    });
  }catch(e){ console.warn(e); setSync('error'); toast('Firebase init failed — check config'); }
}
async function signInGoogle(){
  if(!S.fb.app) await initFirebase();
  if(!S.fb.app){ toast('Paste a valid Firebase config first'); return; }
  try{ await firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
  catch(e){ toast('Sign-in failed: '+e.message); }
}
async function pullCloud(){
  if(!S.fb.user) return;
  const col = S.fb.db.collection('users').doc(S.fb.user.uid);
  const snap = await col.collection('days').get();
  let pulled=0;
  snap.forEach(doc=>{ const r=doc.data(), l=S.days[doc.id];
    if(!l||(r.updatedAt||0)>(l.updatedAt||0)){ S.days[doc.id]=r; pulled++; } });
  const meta = await col.get();
  if(meta.exists){ const md=meta.data();
    if(md.templates && (!localStorage.getItem('hebe_templates'))) S.templates=md.templates;
    if(md.protocols && (!localStorage.getItem('hebe_protocols'))) S.protocols=md.protocols;
    // pull synced settings (API key, model, targets, dob, name) — never overwrite
    // this device's own Firebase config
    if(md.settings){ const s=md.settings; delete s.fbConfig;
      ['apiKey','model','proteinTarget','dob','name'].forEach(k=>{ if(s[k]!=null && !S.settings[k]) S.settings[k]=s[k]; });
      if(s.apiKey) S.settings.apiKey = s.apiKey;
    }
  }
  Object.keys(S.days).forEach(k=>{ if(S.days[k].updatedAt>0) cloudPush(k); });
  // Always persist + re-render: settings (API key, model, targets, dob, name)
  // may have been pulled even when no new day docs arrived. Without this the
  // synced key lived only in memory and was lost on reload → re-asked per device.
  persist(); render();
}
const pushQ=new Set(); let pushT=null, metaT=null;
// Push settings/templates/protocols only (no day docs). Called whenever a
// setting changes so the API key + prefs reach Firestore immediately, not just
// when a day happens to be logged. Uses its own debounce timer.
function pushSettings(){
  if(!S.fb.user||!S.fb.db) return;
  clearTimeout(metaT); setSync('syncing');
  metaT=setTimeout(async()=>{
    try{
      const col=S.fb.db.collection('users').doc(S.fb.user.uid);
      const syncSettings=Object.assign({},S.settings); delete syncSettings.fbConfig;
      await col.set({templates:S.templates, protocols:S.protocols, settings:syncSettings},{merge:true});
      setSync('synced');
    }catch(e){ console.warn(e); setSync('error'); }
  },800);
}
function cloudPush(date){
  if(!S.fb.user||!S.fb.db) return;
  pushQ.add(date); clearTimeout(pushT); setSync('syncing');
  pushT=setTimeout(async()=>{
    try{
      const col=S.fb.db.collection('users').doc(S.fb.user.uid);
      for(const dt of pushQ) await col.collection('days').doc(dt).set(S.days[dt],{merge:true});
      // sync settings too (so API key + prefs follow you to every device),
      // minus fbConfig which is device-local by design
      const syncSettings = Object.assign({}, S.settings); delete syncSettings.fbConfig;
      await col.set({templates:S.templates, protocols:S.protocols, settings:syncSettings},{merge:true});
      pushQ.clear(); setSync('synced');
    }catch(e){ console.warn(e); setSync('error'); }
  },900);
}
function setSync(s){
  S.fb.status=s;
  const map={local:['var(--text3)','Local only'],syncing:['var(--amber)','Syncing…'],synced:['var(--teal)','Synced'],error:['var(--coral)','Sync error']};
  const d=document.getElementById('syncDot'), l=document.getElementById('syncLbl');
  if(d){ d.style.background=map[s][0]; } if(l){ l.textContent=map[s][1]; }
}

async function scoreSkinPhoto(file){
  if(!S.settings.apiKey){ toast('Add an API key in Setup for AI skin reads'); return; }
  toast('Reading skin photo…');
  const b64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
  const mediaType = file.type||'image/jpeg';
  try{
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{ 'content-type':'application/json','x-api-key':S.settings.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model:S.settings.model||'claude-sonnet-5', max_tokens:400,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
          {type:'text',text:'Assess this face photo for skin condition trends an athlete would track: overall score 1-10 (10 = clear, even, hydrated), plus one line on inflammation/texture/tone. Not medical advice, just a consistency tracker. ONLY JSON: {"score":<1-10>,"notes":"<one line>"}'}]}] })
    });
    if(!r.ok) throw new Error('API '+r.status);
    const j = await r.json();
    const p = extractJSON(textFromContent(j));
    const d = ensureDay(S.date);
    d.skin.score = clamp(Math.round(p.score),1,10); d.skin.notes = p.notes||'';
    saveDay(S.date); render(); toast('Skin read: '+d.skin.score+'/10');
  }catch(e){ console.warn(e); toast('Skin read failed — you can self-score instead'); }
}

  } else {
    const top = adj.parts.reduce((a,p)=>Math.abs(p[1])>Math.abs(a[1])?p:a);
    out.textContent = dates.length+' days logged. Sleep '+st.sleepH.toFixed(1)+'h avg, training '+st.trainH.toFixed(1)+'h/day, lifts '+st.liftPerWk.toFixed(1)+'/wk, stress '+st.stress.toFixed(1)+'/10.'+(st.foodAvg?' Food quality '+Math.round(st.foodAvg)+'/100.':'')+' Biggest age driver: '+top[0]+' ('+(top[1]>0?'+':'')+top[1].toFixed(2)+'y). Change one thing: '+(top[1]>0?'attack '+top[0].toLowerCase()+' this week.':'protect what is working — '+top[0].toLowerCase()+' is your edge.');
  }
}

function renderSetup(){
  const s = S.settings;
  const p = S.protocols[0];
  let h = topline() + '<h2>Setup</h2>';
  h += '<div class="grid2eq fade">';
  h += '<div class="card"><h3>You</h3><div class="frow mt"><div><label class="f">Name</label><input id="setName" value="'+esc(s.name)+'"></div><div><label class="f">Birth date</label><input type="date" id="setDob" value="'+esc(s.dob)+'"></div></div>'
    + '<div class="frow mt"><div><label class="f">Protein target (g)</label><input type="number" id="setProt" value="'+s.proteinTarget+'"></div><div><label class="f">Theme</label><select id="setTheme"><option value="light"'+(s.theme==='light'?' selected':'')+'>Light</option><option value="dark"'+(s.theme==='dark'?' selected':'')+'>Dark</option></select></div></div></div>';
  h += '<div class="card"><h3>Claude AI</h3><div class="mt"><label class="f">API key (syncs to your signed-in devices)</label><input type="password" id="setKey" value="'+esc(s.apiKey)+'"></div>'
    + '<div class="mt"><label class="f">Model</label><input id="setModel" value="'+esc(s.model)+'"></div>'
    + '<div class="sub mt" style="color:var(--amber)">If you deploy to public GitHub Pages, remove the key from the file/Setup first — anyone can read it there. Local use is fine.</div></div>';
  h += '</div>';

  h += '<div class="card mt fade"><h3>Templates (your rituals)</h3><div class="sub">These pre-fill every day. Edit the numbers, not your life.</div><div class="grid2eq mt">';
  ['weekday','weekend'].forEach(t=>{
    h += '<div><div style="font-weight:600;font-size:13px;margin-bottom:7px;text-transform:capitalize">'+t+'</div>';
    [['sleepH','Sleep h'],['workoutMin','Workout min'],['rideH','Ride h'],['sitH','Sitting h'],['sunMin','Sun min'],['protein','Protein g'],['water','Water L'],['fastingH','Fasting h']].forEach(([k,l])=>{
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span class="sub">'+l+'</span><input type="number" step="0.25" data-tpl="'+t+'" data-fld="'+k+'" value="'+S.templates[t][k]+'" style="width:82px;text-align:center;padding:5px 6px"></div>';
    });
    h += '</div>';
  });
  h += '</div></div>';

  h += '<div class="card mt fade"><h3>Protocols</h3>';
  if(p) h += '<div class="list-item"><div><b style="font-size:13px">'+esc(p.name)+'</b><div class="sub" style="font-size:11px">'+p.start+' → '+p.end+' · Sat + Sun · '+esc(p.note||'')+'</div></div><button class="btn danger" id="delProto" style="font-size:12px;padding:5px 10px">End it</button></div>';
  else h += '<div class="sub">No active protocol.</div><button class="btn mt" id="addFastProto">Start 4-week weekend fasting</button>';
  h += '</div>';

  const fbReady = !!parseFbConfig();
  h += '<div class="card mt fade"><h3>Firebase sync '+(S.fb.user?'<span class="badge teal" style="margin-left:6px">connected · '+esc(S.fb.user.email||'')+'</span>':'<span class="badge gray" style="margin-left:6px">off — local only</span>')+'</h3>'
    + '<div class="sub mt">Create a Firebase project (free) → enable Google sign-in + Firestore → paste the web config here. Then HEBE syncs PC + phone.</div>'
    + '<textarea id="setFb" rows="4" class="mt" placeholder=\'{ "apiKey": "...", "authDomain": "...", "projectId": "..." }\'>'+esc(s.fbConfig)+'</textarea>'
    + '<div style="display:flex;gap:8px;margin-top:10px">'
    + (S.fb.user? '<button class="btn" id="fbOut">Sign out</button>' : '<button class="btn primary" id="fbIn"'+(fbReady?'':' disabled')+'>Sign in with Google</button>')
    + '</div>'
    + '<details class="sub mt" style="font-size:11.5px"><summary style="cursor:pointer">Firestore rules (copy into console)</summary><pre style="background:var(--card2);padding:8px;border-radius:8px;overflow-x:auto;font-size:10.5px">rules_version = \'2\';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /users/{uid}/{document=**} {\n      allow read, write: if request.auth != null &amp;&amp; request.auth.uid == uid;\n    }\n  }\n}</pre></details></div>';

  h += '<div class="card mt fade"><h3>Backup</h3><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'
    + '<button class="btn primary" id="exportBtn">Export JSON</button>'
    + '<label class="btn" style="cursor:pointer">Import JSON<input type="file" id="importFile" accept=".json" style="display:none"></label>'
    + '<button class="btn danger" id="wipeBtn">Delete all local data</button></div></div>';
  return h;
}

// ---------- shell render ----------
function navHtml(){
  return PAGES.map(([id,label,ic])=>'<button class="nav-item '+(S.page===id?'active':'')+'" data-page="'+id+'">'+ICONS[ic]+' '+label+'</button>').join('');
}
function render(){
  document.getElementById('sideNav').innerHTML = navHtml();
  const sb = document.getElementById('setupNavBtn');
  sb.className = 'nav-item'+(S.page==='setup'?' active':''); sb.innerHTML = ICONS.setup+' Setup';
  const tt = document.getElementById('themeToggle');
  tt.className='nav-item'; tt.innerHTML = (S.settings.theme==='dark'?ICONS.sun+' Light mode':ICONS.moon+' Dark mode');
  document.getElementById('bottomNav').innerHTML = PAGES.concat([['setup','Setup','setup']]).map(([id,label,ic])=>'<button data-page="'+id+'" class="'+(S.page===id?'active':'')+'">'+ICONS[ic]+'<span>'+label+'</span></button>').join('');
  destroyCharts();
  const m = document.getElementById('main');
  if(S.page==='home'){ m.innerHTML=renderHome(); homeCharts(); }
  else if(S.page==='perf'){ m.innerHTML=renderPerf(); perfCharts(); }
  else if(S.page==='fuel'){ m.innerHTML=renderFuel(); fuelCharts(); }
  else if(S.page==='body'){ m.innerHTML=renderBody(); bodyCharts(); }
  else if(S.page==='reports'){ m.innerHTML=renderReports(); reportCharts(); }
  else { m.innerHTML=renderSetup(); }
}
function applyTheme(){
  document.documentElement.classList.toggle('dark', S.settings.theme==='dark');
}

// ---------- events ----------
document.addEventListener('click', e=>{
  const pg = e.target.closest('[data-page]');
  if(pg){ S.page=pg.dataset.page; render(); return; }
  const rng = e.target.closest('[data-range]');
  if(rng){ S.trendRange=+rng.dataset.range; render(); return; }
  const wt = e.target.closest('.wt-chip');
  if(wt){ document.querySelectorAll('.wt-chip').forEach(x=>x.classList.remove('on')); wt.classList.add('on'); return; }
  const dc = e.target.closest('.dev-chip');
  if(dc){ const id=dc.dataset.chip; if(activeChips.has(id)){activeChips.delete(id);dc.classList.remove('on');} else {activeChips.add(id);dc.classList.add('on');} return; }
  const del = e.target.closest('[data-delfood]');
  if(del){ const d=ensureDay(S.date); d.foods.splice(+del.dataset.delfood,1); saveDay(S.date); render(); return; }
  if(e.target.id==='modalBg') hideModal();
  const t = e.target.closest('button, label'); if(!t) return;
  switch(t.id){
    case 'themeToggle': S.settings.theme = S.settings.theme==='dark'?'light':'dark'; persist(); applyTheme(); render(); break;
    case 'ciYes': applyCheckin(true); break;
    case 'ciNo': checkinOpen=!checkinOpen; render(); break;
    case 'ciApply': applyCheckin(false); break;
    case 'reopenCheckin': { const d=ensureDay(S.date); d.confirmed=false; checkinOpen=true; render(); break; }
    case 'coachAiBtn': t.disabled=true; t.textContent='Thinking…'; coachAI().catch(err=>{toast('Coach failed: '+err.message); render();}); break;
    case 'foodGo': doFoodSearch(); break;
    case 'saveHeart': { const d=ensureDay(S.date);
      const r=+document.getElementById('rhrIn').value||null, hv=+document.getElementById('hrvIn').value||null;
      d.heart.rhr=r; d.wearable.hrv=hv; if(r) d.wearable.restingHR=r;
      saveDay(S.date); render(); toast('Heart data saved'); break; }
    case 'saveSkin': { const d=ensureDay(S.date);
      const f=document.getElementById('skinFile').files[0];
      const self=+document.getElementById('skinSelf').value||null;
      if(f) scoreSkinPhoto(f);
      else if(self){ d.skin.score=clamp(self,1,10); saveDay(S.date); render(); toast('Skin score saved'); }
      break; }
    case 'genReport': genWeekly(); break;
    case 'fbIn': signInGoogle(); break;
    case 'fbOut': if(S.fb.app) firebase.auth().signOut(); break;
    case 'exportBtn': doExport(); break;
    case 'wipeBtn': doWipe(); break;
    case 'delProto': if(confirm('End this protocol?')){ S.protocols=[]; persist(); render(); } break;
    case 'addFastProto': S.protocols=defaultProtocols(); persist(); render(); break;
  }
});
document.addEventListener('input', e=>{
  const el = e.target;
  if(el.dataset&&el.dataset.tpl){ S.templates[el.dataset.tpl][el.dataset.fld]=+el.value; clearTimeout(saveTimer); saveTimer=setTimeout(persist,400); return; }
  switch(el.id){
    case 'setName': S.settings.name=el.value; persist(); pushSettings(); break;
    case 'setDob': if(el.value) S.settings.dob=el.value; persist(); pushSettings(); break;
    case 'setProt': S.settings.proteinTarget=+el.value||135; persist(); pushSettings(); break;
    case 'setKey': S.settings.apiKey=el.value.trim(); persist(); pushSettings(); break;
    case 'setModel': S.settings.model=el.value.trim(); persist(); pushSettings(); break;
    case 'setFb': S.settings.fbConfig=el.value; persist(); break;
    case 'setTheme': S.settings.theme=el.value; persist(); applyTheme(); render(); break;
  }
});
document.addEventListener('change', e=>{
  if(e.target.id==='importFile') doImport(e.target.files[0]);
  if(e.target.id==='ovSleep'||e.target.id==='ovLoad'){ destroyCharts(); reportCharts(); }
  if(e.target.id==='setTheme'){ S.settings.theme=e.target.value; persist(); applyTheme(); render(); }
});
document.addEventListener('keydown', e=>{ if(e.key==='Enter'&&e.target.id==='foodQ') doFoodSearch(); });

// ---------- export/import ----------
function doExport(){
  const payload = { app:'HEBE', exported:new Date().toISOString(), days:S.days, templates:S.templates, protocols:S.protocols, settings:Object.assign({},S.settings,{apiKey:'',fbConfig:''}) };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='hebe-backup-'+todayStr()+'.json'; a.click();
  toast('Backup downloaded');
}
function doImport(file){
  if(!file) return;
  const rd = new FileReader();
  rd.onload = ()=>{ try{
    const j = JSON.parse(rd.result);
    if(!j.days) throw new Error('not a HEBE backup');
    let n=0;
    Object.entries(j.days).forEach(([k,v])=>{ const l=S.days[k]; if(!l||(v.updatedAt||0)>=(l.updatedAt||0)){S.days[k]=v;n++;} });
    if(j.templates) S.templates=j.templates;
    if(j.protocols) S.protocols=j.protocols;
    persist(); render(); toast('Imported '+n+' day(s)');
  }catch(e){ toast('Import failed: '+e.message); } };
  rd.readAsText(file);
}
function doWipe(){
  if(!confirm('Delete ALL local HEBE data? Export first!')) return;
  ['hebe_days','hebe_templates','hebe_protocols','hebe_lastreport'].forEach(k=>localStorage.removeItem(k));
  S.days={}; S.templates=JSON.parse(JSON.stringify(TEMPLATE_DEFAULTS)); S.protocols=defaultProtocols();
  render(); toast('Local data deleted');
}

// ---------- boot ----------
loadLocal();
applyTheme();
ensureDay(S.date);
render();
setSync('local');
if(parseFbConfig()) initFirebase();
</script>
